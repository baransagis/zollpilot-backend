<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KN-Kandidatenergebnisse</title>
  <style>
    :root {
      --bg-top: #f5f8fb;
      --bg-bottom: #eaf2ef;
      --ink-strong: #16242f;
      --ink-muted: #5f717f;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(15, 45, 66, 0.12);
      --teal: #0f766e;
      --teal-soft: #d5f2ed;
      --amber: #d97706;
      --amber-soft: #fff1d4;
      --rose: #be123c;
      --rose-soft: #ffe3ea;
      --slate: #355469;
      --shadow: 0 16px 40px rgba(15, 30, 48, 0.09);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink-strong);
      background: linear-gradient(170deg, var(--bg-top), var(--bg-bottom));
      font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", "Helvetica Neue", sans-serif;
      line-height: 1.45;
      position: relative;
      overflow-x: hidden;
    }

    .shape {
      position: fixed;
      border-radius: 999px;
      filter: blur(1px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.42;
    }

    .shape-a {
      top: -120px;
      right: -60px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle at 30% 35%, #68d5c4, rgba(104, 213, 196, 0));
    }

    .shape-b {
      bottom: -160px;
      left: -80px;
      width: 440px;
      height: 440px;
      background: radial-gradient(circle at 65% 35%, #ffcc7a, rgba(255, 204, 122, 0));
    }

    .app {
      width: min(1220px, 92vw);
      margin: 34px auto 64px;
      position: relative;
      z-index: 1;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 26px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--teal);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.4vw, 2.1rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 12px 0 0;
      color: var(--ink-muted);
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      color: white;
      background: linear-gradient(130deg, #0f766e, #14857c);
      box-shadow: 0 10px 20px rgba(15, 118, 110, 0.24);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(15, 118, 110, 0.3);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .meta {
      margin: 0;
      color: var(--ink-muted);
      font-size: 0.87rem;
      text-align: right;
    }

    .summary {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .summary-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      padding: 14px 14px 12px;
      box-shadow: 0 10px 24px rgba(20, 36, 56, 0.05);
      min-height: 90px;
    }

    .summary-card dt {
      margin: 0;
      color: var(--ink-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .summary-card dd {
      margin: 10px 0 0;
      font-size: 1.58rem;
      font-weight: 760;
      letter-spacing: -0.03em;
    }

    .controls {
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      padding: 14px;
      display: grid;
      grid-template-columns: 1.5fr 190px;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(20, 36, 56, 0.05);
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: var(--ink-muted);
      font-size: 0.83rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .control input,
    .control select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #bfd0db;
      background: #fff;
      min-height: 42px;
      padding: 0 12px;
      color: var(--ink-strong);
      font-size: 0.95rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .control input:focus,
    .control select:focus {
      border-color: #3d8f99;
      box-shadow: 0 0 0 4px rgba(77, 162, 172, 0.14);
      outline: none;
    }

    .status {
      margin-top: 14px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.9rem;
      background: #eef3f7;
      color: #395064;
      border: 1px solid #d8e1e8;
      transition: all 0.2s ease;
    }

    .status.ok {
      background: #e8f8f4;
      border-color: #bee7dd;
      color: #165348;
    }

    .status.error {
      background: #fff0f3;
      border-color: #f4cad5;
      color: #8b1f3f;
    }

    .results {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 14px;
    }

    .result-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      box-shadow: 0 12px 30px rgba(18, 34, 53, 0.07);
      padding: 14px;
      display: grid;
      gap: 10px;
      animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: var(--delay, 0ms);
    }

    .head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .head h2 {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.3;
      letter-spacing: -0.015em;
    }

    .material-number {
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-top: 3px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 760;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge.high {
      background: var(--teal-soft);
      color: #14584f;
      border-color: #a5ddd2;
    }

    .badge.medium {
      background: var(--amber-soft);
      color: #8a5b10;
      border-color: #f2d39b;
    }

    .badge.low {
      background: var(--rose-soft);
      color: #8b2442;
      border-color: #f1bfcc;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 4px 9px;
      border-radius: 999px;
      background: #edf3f8;
      color: #2d4d63;
      font-size: 0.77rem;
      font-weight: 640;
      border: 1px solid #d7e3eb;
    }

    .chip.empty {
      color: #6f8798;
      background: #f4f8fb;
    }

    .muted {
      margin: 0;
      color: var(--ink-muted);
      font-size: 0.87rem;
    }

    details {
      border: 1px solid #dde7ef;
      border-radius: 10px;
      padding: 8px 10px;
      background: #f9fcff;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      color: #395064;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    details code {
      display: block;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "SF Mono", "Consolas", "Courier New", monospace;
      color: #1f3a4f;
      font-size: 0.81rem;
      background: #eef5fa;
      border: 1px solid #d6e6f2;
      border-radius: 8px;
      padding: 8px;
    }

    .attr-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .attr h3,
    .candidates h3,
    .llm h3,
    .missing h3 {
      margin: 0 0 6px;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #496074;
    }

    .candidate-list,
    .missing-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .candidate-item {
      border: 1px solid #d8e6f1;
      border-radius: 11px;
      background: #f8fcff;
      padding: 8px;
    }

    .candidate-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #2e4a5f;
    }

    .candidate-row strong {
      font-size: 0.83rem;
      letter-spacing: 0.01em;
    }

    .score {
      font-weight: 760;
      color: #103950;
    }

    .bar {
      margin: 7px 0;
      width: 100%;
      height: 7px;
      background: #dce8f2;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #1d8a90, #1677a0);
      transition: width 0.3s ease;
    }

    .candidate-label {
      margin: 0;
      font-size: 0.84rem;
      color: #24465d;
      font-weight: 650;
    }

    .candidate-reasons {
      margin: 6px 0 0;
      font-size: 0.79rem;
      color: #4f6778;
    }

    .missing-item {
      border-left: 3px solid #efc073;
      padding: 4px 8px;
      background: #fff9ef;
      border-radius: 0 8px 8px 0;
      color: #75542b;
      font-size: 0.82rem;
    }

    .llm-panel {
      border: 1px solid #d5e4ef;
      border-radius: 11px;
      background: #f6fbff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .llm-headline {
      margin: 0;
      color: #173447;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .llm-meta {
      margin: 0;
      color: #4b6475;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .llm-explanation {
      margin: 0;
      color: #335469;
      font-size: 0.83rem;
      line-height: 1.5;
    }

    .llm-candidates {
      margin: 0;
      padding-left: 18px;
      color: #335469;
      font-size: 0.81rem;
      display: grid;
      gap: 5px;
    }

    .llm-empty {
      margin: 0;
      color: #6a7f8f;
      font-size: 0.82rem;
    }

    .llm-loading {
      margin: 0;
      color: #335469;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(23, 103, 160, 0.2);
      border-top-color: #1677a0;
      border-radius: 999px;
      animation: spin 0.9s linear infinite;
      flex-shrink: 0;
    }

    .empty-state {
      grid-column: 1 / -1;
      border: 1px dashed #bfd0db;
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      color: var(--ink-muted);
      background: rgba(255, 255, 255, 0.66);
    }

    .skeleton {
      min-height: 180px;
      position: relative;
      overflow: hidden;
      border-color: #dde6ee;
      background: #f3f7fa;
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, rgba(243, 247, 250, 0), rgba(255, 255, 255, 0.7), rgba(243, 247, 250, 0));
      animation: shimmer 1.1s infinite;
    }

    @keyframes shimmer {
      to {
        transform: translateX(100%);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 860px) {
      .hero {
        flex-direction: column;
      }

      .hero-actions {
        align-items: flex-start;
      }

      .meta {
        text-align: left;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shape shape-a"></div>
  <div class="shape shape-b"></div>

  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">CN/HS-Kandidaten-PoC</p>
        <h1>Klassifizierungsergebnisse aus Ressourcen-CSV</h1>
        <p>Benutzerfreundliche Ansicht von <code>GET /test-resource-csv</code> mit Kandidaten-Ranking, Confidence, extrahierten Merkmalen und Hinweisen zu fehlenden Informationen.</p>
      </div>
      <div class="hero-actions">
        <button id="reloadBtn" class="btn" type="button">Ergebnisse neu laden</button>
        <p id="lastRefresh" class="meta">Letzte Aktualisierung: -</p>
      </div>
    </section>

    <section id="summary" class="summary" aria-live="polite"></section>

    <section class="controls">
      <label class="control">
        Suche
        <input id="searchInput" type="search" placeholder="Materialnummer, Text, Familie, Kandidatencode">
      </label>
      <label class="control">
        Confidence
        <select id="confidenceFilter">
          <option value="all">Alle</option>
          <option value="high">Hoch</option>
          <option value="medium">Mittel</option>
          <option value="low">Niedrig</option>
        </select>
      </label>
    </section>

    <p id="status" class="status">Warten auf erste Ladung ...</p>

    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <script>
    (() => {
      const endpoint = "/test-resource-csv";
      const llmStatusEndpoint = "/api/v1/classify/llm-status";
      const state = {
        rows: [],
        filtered: [],
        llmJobId: null,
        llmPollTimer: null,
        llmPollStartedAt: null
      };

      const refs = {
        summary: document.getElementById("summary"),
        results: document.getElementById("results"),
        status: document.getElementById("status"),
        reloadBtn: document.getElementById("reloadBtn"),
        lastRefresh: document.getElementById("lastRefresh"),
        searchInput: document.getElementById("searchInput"),
        confidenceFilter: document.getElementById("confidenceFilter")
      };

      let searchTimer;

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function clampScore(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return 0;
        return Math.max(0, Math.min(100, num));
      }

      function formatScore(value) {
        const num = Number(value);
        return Number.isNaN(num) ? "0.0" : num.toFixed(1);
      }

      function setStatus(message, type = "") {
        refs.status.textContent = message;
        refs.status.className = `status ${type}`.trim();
      }

      function stopLlmPolling() {
        if (state.llmPollTimer) {
          clearTimeout(state.llmPollTimer);
          state.llmPollTimer = null;
        }
        state.llmJobId = null;
        state.llmPollStartedAt = null;
      }

      function chips(values) {
        if (!Array.isArray(values) || values.length === 0) {
          return '<span class="chip empty">k. A.</span>';
        }

        return values
          .slice(0, 8)
          .map((value) => `<span class="chip">${escapeHtml(value)}</span>`)
          .join("");
      }

      function renderSummary(allRows, shownRows) {
        const confidenceCount = shownRows.reduce((acc, row) => {
          const key = (row.confidence || "unbekannt").toLowerCase();
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});

        const familyCount = shownRows.reduce((acc, row) => {
          const key = row.normalizedFamily || "unbekannt";
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});

        const topFamily = Object.entries(familyCount)
          .sort((a, b) => b[1] - a[1])[0];

        const avgTopScore = shownRows.length === 0
          ? 0
          : shownRows
              .map((row) => Number(row.candidates?.[0]?.score || 0))
              .reduce((sum, value) => sum + value, 0) / shownRows.length;

        const cards = [
          ["Geladene Zeilen", allRows.length],
          ["Angezeigte Zeilen", shownRows.length],
          ["Hohe Confidence", confidenceCount.high || 0],
          ["Mittlere Confidence", confidenceCount.medium || 0],
          ["Niedrige Confidence", confidenceCount.low || 0],
          ["Top-Familie", topFamily ? `${topFamily[0]} (${topFamily[1]})` : "k. A."],
          ["Durchschn. Top-Score", `${avgTopScore.toFixed(1)}`]
        ];

        refs.summary.innerHTML = cards
          .map(([label, value]) => `
            <dl class="summary-card">
              <dt>${escapeHtml(label)}</dt>
              <dd>${escapeHtml(value)}</dd>
            </dl>
          `)
          .join("");
      }

      function attributeSection(label, values) {
        return `
          <div class="attr">
            <h3>${escapeHtml(label)}</h3>
            <div class="chips">${chips(values)}</div>
          </div>
        `;
      }

      function llmConfidence(value) {
        const numeric = Number(value);
        if (Number.isFinite(numeric)) {
          return Math.max(0, Math.min(100, Math.round(numeric)));
        }
        return null;
      }

      function normalizeLlmStatus(value) {
        const status = String(value || "").toLowerCase();
        if (status === "pending" || status === "completed" || status === "failed" || status === "skipped") {
          return status;
        }
        return "";
      }

      function llmSection(row) {
        const llmStatus = normalizeLlmStatus(row?.llmStatus);
        if (llmStatus === "pending") {
          return `
            <div class="llm-panel">
              <p class="llm-headline">KI-Klassifizierung wird verarbeitet ...</p>
              <p class="llm-loading"><span class="spinner" aria-hidden="true"></span> Ergebnis wird nachgeladen.</p>
            </div>
          `;
        }

        if (llmStatus === "failed") {
          return '<p class="llm-empty">LLM-Ergebnis konnte nicht erzeugt werden. Lokales Ergebnis bleibt sichtbar.</p>';
        }

        if (llmStatus === "skipped") {
          return '<p class="llm-empty">LLM-Anreicherung ist deaktiviert oder nicht konfiguriert.</p>';
        }

        const llm = row?.llm;
        if (!llm || typeof llm !== "object") {
          return '<p class="llm-empty">Kein LLM-Ergebnis verfügbar.</p>';
        }

        const confidence = llmConfidence(llm.confidencePercent);
        const candidateHeadlines = Array.isArray(llm.candidateHeadlines) ? llm.candidateHeadlines : [];
        const candidatesHtml = candidateHeadlines.length > 0
          ? `<ul class="llm-candidates">${candidateHeadlines.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
          : '<p class="llm-empty">Keine LLM-Kandidatenzeilen vorhanden.</p>';

        return `
          <div class="llm-panel">
            <p class="llm-headline">${escapeHtml(llm.headline || "Ohne LLM-Headline")}</p>
            <p class="llm-meta">Gewählte CN: <strong>${escapeHtml(llm.selectedCnCode || "k. A.")}</strong> | LLM-Confidence: <strong>${confidence === null ? "k. A." : `${confidence}%`}</strong></p>
            <p class="llm-explanation">${escapeHtml(llm.explanation || "Keine Begründung vorhanden.")}</p>
            ${candidatesHtml}
          </div>
        `;
      }

      function buildCard(row, index) {
        const confidence = String(row.confidence || "low").toLowerCase();
        const family = row.normalizedFamily || "unbekannt";
        const topCandidate = row.candidates?.[0];
        const confidenceLabel = confidence === "high"
          ? "Hoch"
          : confidence === "medium"
            ? "Mittel"
            : "Niedrig";

        const candidatesHtml = Array.isArray(row.candidates) && row.candidates.length > 0
          ? row.candidates.map((candidate) => {
              const reasons = Array.isArray(candidate.reasons) ? candidate.reasons : [];
              return `
                <li class="candidate-item">
                  <div class="candidate-row">
                    <strong>${escapeHtml(candidate.code || "k. A.")}</strong>
                    <span class="score">${formatScore(candidate.score)}</span>
                  </div>
                  <div class="bar"><span style="width:${clampScore(candidate.score)}%"></span></div>
                  <p class="candidate-label">${escapeHtml(candidate.label || "")}</p>
                  <p class="candidate-reasons">${reasons.map(escapeHtml).join(" | ") || "Keine Begrundungen vorhanden"}</p>
                </li>
              `;
            }).join("")
          : '<li class="candidate-item"><p class="muted">Keine Kandidaten zuruckgegeben.</p></li>';

        const missing = Array.isArray(row.missingInformation) ? row.missingInformation : [];
        const missingHtml = missing.length > 0
          ? missing.map((item) => `<li class="missing-item">${escapeHtml(item)}</li>`).join("")
          : '<li class="missing-item">Keine zusatzlichen fehlenden Informationen markiert.</li>';

        const attributes = row.attributes || {};

        return `
          <article class="result-card" style="--delay: ${index * 36}ms;">
            <header class="head">
              <div>
                <h2>${escapeHtml(row.shortText || "(kein Kurztext)")}</h2>
                <p class="material-number">Material ${escapeHtml(row.materialNumber || "k. A.")}</p>
              </div>
              <span class="badge ${escapeHtml(confidence)}">${escapeHtml(confidenceLabel)}</span>
            </header>

            <div class="chips">
              <span class="chip">Familie: ${escapeHtml(family)}</span>
              <span class="chip">Top: ${escapeHtml(topCandidate?.code || "k. A.")}</span>
              <span class="chip">Top-Score: ${formatScore(topCandidate?.score || 0)}</span>
            </div>

            <p class="muted">${escapeHtml(row.purchaseText || "")}</p>

            <details>
              <summary>Normalisierter Text</summary>
              <code>${escapeHtml(row.normalizedText || "")}</code>
            </details>

            <section class="candidates">
              <h3>Top-Kandidaten</h3>
              <ul class="candidate-list">${candidatesHtml}</ul>
            </section>

            <section class="llm">
              <h3>LLM-Klassifizierung (Vergleich)</h3>
              ${llmSection(row)}
            </section>

            <section class="attr-grid">
              ${attributeSection("Abmessungen", attributes.dimensions)}
              ${attributeSection("Normen", attributes.norms)}
              ${attributeSection("Materialhinweise", attributes.materialHints)}
              ${attributeSection("Haertehinweise", attributes.hardnessHints)}
              ${attributeSection("Modell-Tokens", attributes.modelTokens)}
              ${attributeSection("Oberflachenhinweise", attributes.surfaceHints)}
            </section>

            <section class="missing">
              <h3>Fehlende Informationen</h3>
              <ul class="missing-list">${missingHtml}</ul>
            </section>
          </article>
        `;
      }

      function renderResults(rows) {
        if (rows.length === 0) {
          refs.results.innerHTML = '<div class="empty-state">Keine Zeilen entsprechen den aktuellen Filtern.</div>';
          return;
        }

        refs.results.innerHTML = rows.map((row, index) => buildCard(row, index)).join("");
      }

      function applyFilters() {
        const query = refs.searchInput.value.trim().toLowerCase();
        const confidence = refs.confidenceFilter.value;

        state.filtered = state.rows.filter((row) => {
          const confidenceMatch = confidence === "all" || String(row.confidence || "").toLowerCase() === confidence;
          if (!confidenceMatch) {
            return false;
          }

          if (!query) {
            return true;
          }

          const haystack = [
            row.materialNumber,
            row.shortText,
            row.purchaseText,
            row.normalizedText,
            row.normalizedFamily,
            ...(row.candidates || []).flatMap((candidate) => [candidate.code, candidate.label]),
            row.llm?.headline,
            row.llm?.selectedCnCode,
            row.llm?.explanation,
            ...(row.llm?.candidateHeadlines || [])
          ]
            .map((value) => String(value || "").toLowerCase())
            .join(" ");

          return haystack.includes(query);
        });

        renderSummary(state.rows, state.filtered);
        renderResults(state.filtered);
      }

      function showLoading() {
        refs.results.innerHTML = [0, 1, 2].map(() => '<article class="result-card skeleton"></article>').join("");
      }

      async function pollLlmResults() {
        const jobId = state.llmJobId;
        if (!jobId) {
          return;
        }
        if (state.llmPollStartedAt && Date.now() - state.llmPollStartedAt > 10 * 60 * 1000) {
          stopLlmPolling();
          setStatus("KI-Anreicherung hat das Zeitlimit überschritten. Bitte neu laden.", "error");
          return;
        }

        try {
          const response = await fetch(`${llmStatusEndpoint}/${encodeURIComponent(jobId)}`, {
            method: "GET",
            headers: { "Accept": "application/json" },
            cache: "no-store"
          });

          const text = await response.text();
          const payload = text.trim().length > 0 ? JSON.parse(text) : null;
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const rows = Array.isArray(payload?.results) ? payload.results : null;
          if (rows) {
            state.rows = rows;
            applyFilters();
          }

          const jobStatus = String(payload?.llmJobStatus || "").toLowerCase();
          if (jobStatus === "completed") {
            stopLlmPolling();
            setStatus(`${state.rows.length} Zeilen inklusive KI-Ausgabe geladen.`, "ok");
            return;
          }

          if (jobStatus === "failed") {
            stopLlmPolling();
            setStatus("Lokale Ergebnisse geladen, KI-Anreicherung ist fehlgeschlagen.", "error");
            return;
          }

          setStatus(`${state.rows.length} lokale Zeilen geladen. KI-Ergebnisse werden nachgeladen ...`, "loading");
          state.llmPollTimer = setTimeout(pollLlmResults, 1500);
        } catch (error) {
          stopLlmPolling();
          const message = error instanceof Error ? error.message : String(error);
          setStatus(`KI-Status konnte nicht aktualisiert werden: ${message}`, "error");
        }
      }

      async function loadData() {
        stopLlmPolling();
        refs.reloadBtn.disabled = true;
        showLoading();
        setStatus(`Daten von ${endpoint} werden geladen ...`);

        try {
          const response = await fetch(endpoint, {
            method: "GET",
            headers: { "Accept": "application/json" },
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          const rows = Array.isArray(payload)
            ? payload
            : Array.isArray(payload?.results)
              ? payload.results
              : null;

          if (!rows) {
            throw new Error("Der Endpunkt hat keine gueltige Ergebnisliste zuruckgegeben.");
          }

          state.rows = rows;
          applyFilters();

          const now = new Date();
          refs.lastRefresh.textContent = `Letzte Aktualisierung: ${now.toLocaleString()}`;
          const llmJobId = typeof payload?.llmJobId === "string" ? payload.llmJobId : null;
          const llmJobStatus = String(payload?.llmJobStatus || "").toLowerCase();

          if (llmJobId && llmJobStatus === "processing") {
            state.llmJobId = llmJobId;
            state.llmPollStartedAt = Date.now();
            setStatus(`${state.rows.length} lokale Zeilen geladen. KI-Ergebnisse werden nachgeladen ...`, "loading");
            state.llmPollTimer = setTimeout(pollLlmResults, 1200);
          } else {
            setStatus(`${state.rows.length} Zeilen von ${endpoint} geladen.`, "ok");
          }
        } catch (error) {
          refs.summary.innerHTML = "";
          refs.results.innerHTML = '<div class="empty-state">Daten konnten nicht geladen werden. Bitte Backend-Status und Endpunktpfad prufen.</div>';
          const message = error instanceof Error ? error.message : String(error);
          setStatus(`Ergebnisse konnten nicht geladen werden: ${message}`, "error");
        } finally {
          refs.reloadBtn.disabled = false;
        }
      }

      refs.reloadBtn.addEventListener("click", loadData);
      refs.confidenceFilter.addEventListener("change", applyFilters);
      refs.searchInput.addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(applyFilters, 120);
      });

      loadData();
    })();
  </script>
</body>
</html>
